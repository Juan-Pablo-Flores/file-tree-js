<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <!-- <link rel="stylesheet" href="https://uicdn.toast.com/grid/latest/tui-grid.css" /> -->
    <link rel="stylesheet" href="src/css/style.css">
</head>

<body>
    <div id="main-content">
        <div id="container"></div>
        <div id="panel">
            <div>
                <p id="detail">Click on a file/directory to see details</p>
                <span id="path"></span>
                <span><a title="Go to file in file explorer" href="#"><img class="post-label-icon" id="hyperlink-icon"
                            src="/src/img/hyperlink-icon.png" style="visibility: hidden;"></img></a></span>
            </div>
            <div id="panel-metrics" class="my-4">
                <p class="metric"><img src="/src/img/documentation-icon.png" alt="linter"
                        class="metric-icon">Documentation (<span id="documentation-metric">0</span>%)</p>
                <div class="panel-bar"><span id="documentation-bar"></span></div>

                <p class="sub-metric">Missing documentation (<span id="missing-docs-metric">0</span>%)</p>
                <div class="panel-bar panel-sub-bar">
                    <div id="missing-docs-bar"></div>
                </div>

                <p class="sub-metric">Documentation issues (<span id="non-doxy-docs-metric">0</span>%)</p>
                <div class="panel-bar panel-sub-bar">
                    <div id="non-doxy-docs-bar"></div>
                </div>

                <p class="metric"><img src="/src/img/bus-factor-icon.png" alt="linter" class="metric-icon"> Bus Factor
                    (N/A)</p>
                <div class="panel-bar under-development-wrapper"><span id="bus-factor-bar"></span><span
                        class="under-development">Under Development</span></div>

                <p class="metric"><img src="/src/img/linter-icon.png" alt="linter" class="metric-icon"> Linter issues
                    (<span id="linter-metric">0</span>%)</p>
                <div class="panel-bar"><span id="linter-bar"></span></div>
            </div>

            <div>
                <a id="panel-subscribe-btn" class="btn btn-primary d-inline my-4" style="visibility: hidden;">Notify on
                    pull request</a>
            </div>
        </div>
    </div>

    <!-- <script src="https://uicdn.toast.com/grid/latest/tui-grid.js"></script> -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
    <script type="module" src="src/js/main.js"></script>
</body>

</html>
